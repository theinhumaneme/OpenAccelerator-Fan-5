services:

  vllm:
    image: vllm/vllm-openai:latest
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      HF_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in .env}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VERIFIER_MODEL: ${VERIFIER_MODEL:?Select a run with run.sh}
      VERIFIER_DTYPE: ${VERIFIER_DTYPE:-bfloat16}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME:-benchmark-model}
      SPECULATIVE_CONFIG: ${SPECULATIVE_CONFIG:-}
      VLLM_PORT: ${VLLM_PORT:-8000}
      GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION:-0.90}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-4096}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS:-1}
      BLOCK_SIZE: ${BLOCK_SIZE:-16}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 180s
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        if [[ -n "$$SPECULATIVE_CONFIG" ]]; then
          exec vllm serve "$$VERIFIER_MODEL" \
            --host 0.0.0.0 \
            --port 8000 \
            --served-model-name "$$SERVED_MODEL_NAME" \
            --dtype "$$VERIFIER_DTYPE" \
            --gpu-memory-utilization "$$GPU_MEMORY_UTILIZATION" \
            --max-model-len "$$MAX_MODEL_LEN" \
            --max-num-seqs "$$MAX_NUM_SEQS" \
            --block-size "$$BLOCK_SIZE" \
            --disable-log-requests \
            --enable-metrics \
            --speculative-config "$$SPECULATIVE_CONFIG"
        else
          exec vllm serve "$$VERIFIER_MODEL" \
            --host 0.0.0.0 \
            --port 8000 \
            --served-model-name "$$SERVED_MODEL_NAME" \
            --dtype "$$VERIFIER_DTYPE" \
            --gpu-memory-utilization "$$GPU_MEMORY_UTILIZATION" \
            --max-model-len "$$MAX_MODEL_LEN" \
            --max-num-seqs "$$MAX_NUM_SEQS" \
            --block-size "$$BLOCK_SIZE" \
            --disable-log-requests \
            --enable-metrics
        fi
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  benchmark:
    build: .
    depends_on:
      vllm:
        condition: service_healthy
    environment:
      VLLM_BASE_URL: http://vllm:8000/v1
      VLLM_METRICS_URL: http://vllm:8000/metrics
    volumes:
      - ./results:/app/results
      - ./configs:/app/configs
      - ./workload_data:/app/workload_data
    command: >
      --config configs/experiment.yaml
      --run-id ${RUN_ID:?Select a run with run.sh}
      --external-vllm
      --skip-vram-validation
      --base-url http://vllm:8000/v1
      --metrics-url http://vllm:8000/metrics
      --health-timeout ${VLLM_WAIT:-600}
      --out-dir /app/results

volumes:
  hf-cache:
